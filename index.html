<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Periodic Table — NEET & Class 12</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Code+Pro:wght@400;500&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  /* ===== DARK MODE (default) ===== */
  :root {
    --bg: #040d1a;
    --surface: #071428;
    --surface2: #0a1f3a;
    --border: #0d3a6e;
    --glow: #00d4ff;
    --glow2: #00ff9d;
    --glow3: #ff6b35;
    --text: #d4e8ff;
    --text-dim: #5a8ab0;
    --modal-bg: #030b17;
    --header-sub: #4a7a9b;
    --label-color: #3a6080;
    --search-bg: #0a1f3a;
    --tag-bg: rgba(0,212,255,0.08);
    --tag-border: rgba(0,212,255,0.2);
    --tag-color: #00d4ff;
    --prop-bg: #0a1f3a;
    --neet-bg: rgba(0,255,157,0.05);
    --neet-border: rgba(0,255,157,0.2);
  }

  /* ===== LIGHT / DAY MODE ===== */
  :root.day {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #e8eef5;
    --border: #c5d5e8;
    --glow: #0066cc;
    --glow2: #00885a;
    --glow3: #cc4400;
    --text: #1a2e42;
    --text-dim: #5a7a9a;
    --modal-bg: #ffffff;
    --header-sub: #7a9ab5;
    --label-color: #9ab5cc;
    --search-bg: #ffffff;
    --tag-bg: rgba(0,102,204,0.06);
    --tag-border: rgba(0,102,204,0.25);
    --tag-color: #0066cc;
    --prop-bg: #f0f4f8;
    --neet-bg: rgba(0,136,90,0.05);
    --neet-border: rgba(0,136,90,0.2);
  }

    --alkali: #e53935;
    --alkaline: #e64a19;
    --transition: #e6940a;
    --post-transition: #27ae60;
    --metalloid: #2980b9;
    --nonmetal: #7b1fa2;
    --halogen: #ad1457;
    --noble: #00838f;
    --lanthanide: #c77b00;
    --actinide: #bf360c;
    --unknown: #546e7a;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    font-family: 'Lora', Georgia, 'Times New Roman', serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: auto;
    transition: background 0.3s, color 0.3s;
  }

  :root:not(.day) body {
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(0,212,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(0,255,157,0.04) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(13,58,110,0.12) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(13,58,110,0.12) 40px);
  }

  header {
    text-align: center;
    padding: 24px 20px 10px;
    position: relative;
  }
  header h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(1.4rem, 3vw, 2.3rem);
    font-weight: 800;
    letter-spacing: 0.04em;
    background: linear-gradient(90deg, var(--glow), var(--glow2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 10px rgba(0,212,255,0.35));
  }
  :root.day header h1 {
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
  }
  header p {
    font-family: 'Source Code Pro', 'Courier New', monospace;
    font-size: 0.72rem;
    color: var(--header-sub);
    letter-spacing: 0.18em;
    margin-top: 4px;
  }

  /* Day/Night toggle */
  .mode-toggle {
    position: absolute;
    top: 20px; right: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    cursor: pointer;
    font-family: 'Lora', serif;
    font-size: 0.78rem;
    color: var(--text);
    display: flex; align-items: center; gap: 6px;
    transition: all 0.2s;
    user-select: none;
  }
  .mode-toggle:hover { border-color: var(--glow); color: var(--glow); }
  .mode-icon { font-size: 1rem; }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 12px;
    justify-content: center;
    padding: 10px 16px 6px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.72rem;
    font-family: 'Lora', serif;
    color: var(--text-dim);
    cursor: pointer;
    transition: color 0.2s;
  }
  .legend-item:hover { color: var(--text); }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* Search */
  .search-bar {
    display: flex;
    justify-content: center;
    padding: 8px 16px 10px;
  }
  .search-bar input {
    background: var(--search-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Lora', serif;
    font-size: 0.82rem;
    padding: 7px 16px;
    width: 300px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-bar input::placeholder { color: var(--text-dim); }
  .search-bar input:focus {
    border-color: var(--glow);
    box-shadow: 0 0 12px rgba(0,212,255,0.2);
  }

  /* Table Wrapper */
  .table-wrapper {
    overflow-x: auto;
    padding: 6px 12px 20px;
  }

  .pt-grid {
    display: grid;
    grid-template-columns: repeat(18, minmax(58px, 1fr));
    grid-template-rows: repeat(10, 58px);
    gap: 3px;
    min-width: 1080px;
    max-width: 1380px;
    margin: 0 auto;
  }

  /* Element cell */
  .el {
    position: relative;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3px 2px;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    background: var(--surface);
    overflow: hidden;
  }
  .el::before {
    content: '';
    position: absolute; inset: 0;
    opacity: 0.14;
    border-radius: 4px;
    background: var(--cat-color);
    transition: opacity 0.15s;
  }
  .el:hover {
    transform: scale(1.18) translateZ(0);
    z-index: 10;
    box-shadow: 0 0 18px var(--cat-color), 0 0 6px rgba(0,0,0,0.8);
    border-color: var(--cat-color);
  }
  .el:hover::before { opacity: 0.35; }

  .el .num {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.54rem;
    color: var(--text-dim);
    align-self: flex-start;
    padding-left: 3px;
    line-height: 1;
  }
  .el .sym {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    line-height: 1.1;
    text-shadow: 0 0 8px var(--cat-color);
  }
  :root.day .el .sym { color: var(--text); }
  .el .name {
    font-family: 'Lora', serif;
    font-size: 0.42rem;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
    text-align: center;
    padding: 0 2px;
  }
  .el .mass {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.4rem;
    color: var(--text-dim);
    margin-top: 1px;
  }

  /* State indicators */
  .el .state {
    position: absolute;
    top: 2px; right: 3px;
    font-size: 0.38rem;
    font-family: 'Source Code Pro', monospace;
    opacity: 0.7;
  }

  /* Period/Group labels */
  .label-period {
    display: flex; align-items: center; justify-content: center;
    font-family: 'Source Code Pro', monospace;
    font-size: 0.6rem;
    color: var(--label-color);
  }
  .label-group {
    display: flex; align-items: center; justify-content: center;
    font-family: 'Source Code Pro', monospace;
    font-size: 0.58rem;
    color: var(--label-color);
  }

  /* f-block separator */
  .fblock-label {
    grid-column: 1 / 4;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Source Code Pro', monospace;
    font-size: 0.56rem;
    color: var(--label-color);
    letter-spacing: 0.08em;
  }

  /* Highlighted */
  .el.highlighted {
    box-shadow: 0 0 20px var(--glow), inset 0 0 10px rgba(0,212,255,0.1);
    border-color: var(--glow) !important;
    transform: scale(1.05);
    z-index: 5;
  }
  .el.dimmed { opacity: 0.25; }

  /* ===== MODAL ===== */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(2,8,20,0.88);
    backdrop-filter: blur(8px);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 16px;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--modal-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 720px;
    max-height: 92vh;
    overflow-y: auto;
    position: relative;
    box-shadow: 0 0 60px rgba(0,212,255,0.1), 0 8px 40px rgba(0,0,0,0.5);
    animation: modalIn 0.2s ease;
  }
  :root.day .modal {
    box-shadow: 0 4px 30px rgba(0,0,0,0.15), 0 1px 6px rgba(0,0,0,0.08);
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    display: flex;
    align-items: stretch;
    gap: 0;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .modal-symbol-block {
    width: 120px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 10px;
    border-right: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .modal-symbol-block::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--modal-cat-color);
    opacity: 0.12;
  }
  .modal-symbol-block .m-num {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
  }
  .modal-symbol-block .m-sym {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 3rem;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 0 20px var(--modal-cat-color);
    line-height: 1;
  }
  :root.day .modal-symbol-block .m-sym { color: var(--text); text-shadow: none; }
  .modal-symbol-block .m-mass {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.68rem;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .modal-title-area {
    flex: 1;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .modal-title-area h2 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.02em;
  }
  .modal-title-area .m-cat {
    font-size: 0.72rem;
    color: var(--modal-cat-color);
    font-family: 'Source Code Pro', monospace;
    letter-spacing: 0.1em;
    margin-top: 3px;
  }
  .modal-title-area .m-config {
    font-size: 0.72rem;
    color: var(--text-dim);
    font-family: 'Source Code Pro', monospace;
    margin-top: 6px;
    word-break: break-all;
  }

  .close-btn {
    position: absolute; top: 12px; right: 14px;
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); border-radius: 4px;
    width: 28px; height: 28px; cursor: pointer;
    font-size: 1rem; display: flex; align-items: center; justify-content: center;
    transition: color 0.2s, border-color 0.2s;
  }
  .close-btn:hover { color: #fff; border-color: var(--glow); }

  .modal-body { padding: 20px; }

  .prop-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 16px;
    margin-bottom: 18px;
  }
  @media (max-width: 500px) { .prop-grid { grid-template-columns: 1fr; } }

  .prop-item {
    background: var(--prop-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .prop-label {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .prop-value {
    font-size: 0.9rem;
    color: var(--text);
    font-weight: 600;
    font-family: 'Lora', serif;
  }
  .prop-value.highlight { color: var(--glow2); }

  .section-title {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.66rem;
    letter-spacing: 0.14em;
    color: var(--glow);
    text-transform: uppercase;
    border-bottom: 1px solid rgba(0,212,255,0.2);
    padding-bottom: 5px;
    margin-bottom: 12px;
  }
  :root.day .section-title { border-color: rgba(0,102,204,0.2); }

  .neet-box {
    background: var(--neet-bg);
    border: 1px solid var(--neet-border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .neet-box .section-title { color: var(--glow2); border-color: var(--neet-border); }
  .neet-fact {
    font-size: 0.84rem;
    font-family: 'Lora', serif;
    color: var(--text);
    margin-bottom: 7px;
    padding-left: 12px;
    position: relative;
    line-height: 1.55;
  }
  .neet-fact::before {
    content: '▸';
    position: absolute; left: 0;
    color: var(--glow2);
    font-size: 0.65rem;
    top: 3px;
  }

  .uses-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .tag {
    background: var(--tag-bg);
    border: 1px solid var(--tag-border);
    border-radius: 4px;
    padding: 3px 10px;
    font-size: 0.72rem;
    color: var(--tag-color);
    font-family: 'Lora', serif;
  }

  .electron-shells {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .shell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .shell-circle {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid rgba(0,212,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Source Code Pro', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--glow);
    background: rgba(0,212,255,0.06);
  }
  :root.day .shell-circle {
    border-color: rgba(0,102,204,0.3);
    background: rgba(0,102,204,0.06);
    color: var(--glow);
  }
  .shell-name {
    font-size: 0.55rem;
    font-family: 'Source Code Pro', monospace;
    color: var(--text-dim);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--glow); }

  /* Filter active */
  .filter-active .el:not(.cat-match) { opacity: 0.12 !important; }
</style>
</head>
<body>

<header>
  <h1>⚗ Periodic Table of Elements</h1>
  <p>CLASS XII · NEET · JEE · COMPLETE REFERENCE</p>
  <button class="mode-toggle" id="modeBtn" onclick="toggleMode()">
    <span class="mode-icon" id="modeIcon">☀️</span>
    <span id="modeLabel">Day Mode</span>
  </button>
</header>

<div class="legend" id="legend"></div>

<div class="search-bar">
  <input type="text" id="search" placeholder="Search element, symbol, or atomic number..." autocomplete="off">
</div>

<div class="table-wrapper">
  <div class="pt-grid" id="pt-grid"></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-header">
      <div class="modal-symbol-block" id="m-sym-block">
        <div class="m-num" id="m-num"></div>
        <div class="m-sym" id="m-sym"></div>
        <div class="m-mass" id="m-mass"></div>
      </div>
      <div class="modal-title-area">
        <h2 id="m-name"></h2>
        <div class="m-cat" id="m-cat"></div>
        <div class="m-config" id="m-config"></div>
      </div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ===================== ELEMENT DATA =====================
const CATEGORIES = {

// Grid positions: [col, row] 1-indexed (within 18-col, 10-row grid)
// Row 1 = period labels row (row 0 labels), actual period 1 starts row 2
// We'll use a placement map
const GRID_POSITIONS = {
  // period 1
  1:[2,1], 2:[19,1],  // H, He — but group 18 = col 18
};
// Build positions dynamically
function getGridPos(el) {
  const [sym, name, num, mass, period, group, cat] = el;
  // special f-block
  if (cat === 'lanthanide' && num >= 57 && num <= 71) {
    return { col: num - 57 + 4, row: 9 };
  }
  if (cat === 'actinide' && num >= 89 && num <= 103) {
    return { col: num - 89 + 4, row: 10 };
  }
  if (!group) return null;
  // period to row: period + 1 (row 1 reserved for group labels)
  return { col: group, row: period + 1 };
}

// Render legend
const legendEl = document.getElementById('legend');
for (const [key, val] of Object.entries(CATEGORIES)) {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.dataset.cat = key;
  item.innerHTML = `<span class="legend-dot" style="background:${val.color}"></span>${val.label}`;
  item.onclick = () => filterCategory(key, item);
  legendEl.appendChild(item);
}

// Build grid
const grid = document.getElementById('pt-grid');

// Create cells map: "col,row" -> element
const cellMap = {};
const posMap = {};
ELEMENTS.forEach(el => {
  const pos = getGridPos(el);
  if (pos) {
    cellMap[`${pos.col},${pos.row}`] = el;
    posMap[el[0]] = pos;
  }
});

// Place group labels (row 1 = grid row 1, cols 1-18)
for (let col = 1; col <= 18; col++) {
  const div = document.createElement('div');
  div.style.gridColumn = col;
  div.style.gridRow = 1;
  div.className = 'label-group';
  div.textContent = col;
  grid.appendChild(div);
}

// Period labels (col 1 won't interfere because H is col 1)
for (let row = 2; row <= 8; row++) {
  const div = document.createElement('div');
  div.style.gridColumn = 19; // outside grid (hidden overflow) — actually let's skip
  // We'll skip period labels to keep clean
}

// Place all elements
function makeElementCell(elData) {
  const [sym, name, num, mass, period, group, cat, state, config, en, ox, shells, disc, uses, neet] = elData;
  const color = CATEGORIES[cat]?.color || '#636e72';
  const pos = getGridPos(elData);
  if (!pos) return;

  const div = document.createElement('div');
  div.className = `el cat-${cat}`;
  div.style.gridColumn = pos.col;
  div.style.gridRow = pos.row;
  div.style.setProperty('--cat-color', color);
  div.dataset.num = num;
  div.dataset.sym = sym.toLowerCase();
  div.dataset.name = name.toLowerCase();
  div.dataset.cat = cat;

  const stateSymbol = state === 'G' ? '◎' : state === 'L' ? '◉' : '';

  div.innerHTML = `
    <span class="num">${num}</span>
    <span class="sym">${sym}</span>
    <span class="name">${name}</span>
    <span class="mass">${mass}</span>
    ${stateSymbol ? `<span class="state">${stateSymbol}</span>` : ''}
  `;
  div.onclick = () => openModal(elData);
  grid.appendChild(div);
}

// f-block label rows
function makeFBlockLabel(row, label) {
  const div = document.createElement('div');
  div.className = 'fblock-label';
  div.style.gridColumn = '1 / 4';
  div.style.gridRow = row;
  div.textContent = label;
  div.style.fontSize = '0.55rem';
  div.style.color = 'var(--text-dim)';
  div.style.justifyContent = 'flex-end';
  div.style.paddingRight = '8px';
  div.style.letterSpacing = '0.06em';
  grid.appendChild(div);
}

// Empty spacers for f-block rows
function makeSpacer(col, row) {
  const div = document.createElement('div');
  div.style.gridColumn = col;
  div.style.gridRow = row;
  grid.appendChild(div);
}

// f-block row labels
makeFBlockLabel(9, '↳ La–Lu');
makeFBlockLabel(10, '↳ Ac–Lr');

ELEMENTS.forEach(el => makeElementCell(el));

// ===== MODAL =====
function openModal(elData) {
  const [sym, name, num, mass, period, group, cat, state, config, en, ox, shells, disc, uses, neet] = elData;
  const color = CATEGORIES[cat]?.color || '#636e72';

  document.getElementById('m-num').textContent = num;
  document.getElementById('m-sym').textContent = sym;
  document.getElementById('m-mass').textContent = mass + ' u';
  document.getElementById('m-name').textContent = name;
  document.getElementById('m-cat').textContent = CATEGORIES[cat]?.label?.toUpperCase() || cat.toUpperCase();
  document.getElementById('m-config').textContent = 'Config: ' + config;

  const symBlock = document.getElementById('m-sym-block');
  symBlock.style.setProperty('--modal-cat-color', color);
  document.querySelector('.modal').style.setProperty('--modal-cat-color', color);
  document.querySelector('.modal').style.borderColor = color + '50';

  const stateLabel = state === 'G' ? 'Gas' : state === 'L' ? 'Liquid' : 'Solid';

  // Shells display
  const shellNames = ['K','L','M','N','O','P','Q'];
  const shellsHTML = shells.map((n, i) => `
    <div class="shell">
      <div class="shell-circle">${n}</div>
      <div class="shell-name">${shellNames[i]||''}</div>
    </div>
  `).join('');

  // Uses tags
  const useTags = uses.split(',').map(u => `<span class="tag">${u.trim()}</span>`).join('');

  // NEET facts
  const neetHTML = neet && neet.length > 0
    ? neet.map(f => `<div class="neet-fact">${f}</div>`).join('')
    : '<div class="neet-fact">No specific NEET notes — standard element properties apply.</div>';

  document.getElementById('modal-body').innerHTML = `
    <div class="prop-grid">
      <div class="prop-item"><div class="prop-label">Atomic Number</div><div class="prop-value highlight">${num}</div></div>
      <div class="prop-item"><div class="prop-label">Atomic Mass</div><div class="prop-value highlight">${mass} u</div></div>
      <div class="prop-item"><div class="prop-label">Period</div><div class="prop-value">${period}</div></div>
      <div class="prop-item"><div class="prop-label">Group</div><div class="prop-value">${group || 'f-block'}</div></div>
      <div class="prop-item"><div class="prop-label">State (STP)</div><div class="prop-value">${stateLabel}</div></div>
      <div class="prop-item"><div class="prop-label">Electronegativity</div><div class="prop-value">${en || 'N/A'}</div></div>
      <div class="prop-item"><div class="prop-label">Oxidation States</div><div class="prop-value">${ox}</div></div>
      <div class="prop-item"><div class="prop-label">Discovered</div><div class="prop-value">${disc}</div></div>
    </div>

    <div class="section-title">ELECTRON SHELLS (K → ${shellNames[shells.length-1]})</div>
    <div class="electron-shells" style="margin-bottom:18px">${shellsHTML}</div>
    <div style="font-family:'Source Code Pro',monospace;font-size:0.7rem;color:var(--text-dim);margin-bottom:18px">
      Electronic Config: <span style="color:var(--glow)">${config}</span>
    </div>

    <div class="neet-box">
      <div class="section-title">⚡ NEET / CLASS 12 KEY POINTS</div>
      ${neetHTML}
    </div>

    <div class="section-title">COMMON USES & APPLICATIONS</div>
    <div class="uses-tags">${useTags}</div>
  `;

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// Search
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  document.querySelectorAll('.el').forEach(el => {
    if (!q) {
      el.classList.remove('highlighted', 'dimmed');
    } else {
      const match = el.dataset.sym.includes(q) || el.dataset.name.includes(q) || el.dataset.num.includes(q);
      el.classList.toggle('highlighted', match);
      el.classList.toggle('dimmed', !match);
    }
  });
});

// Category filter
let activeFilter = null;
function filterCategory(cat, item) {
  if (activeFilter === cat) {
    activeFilter = null;
    document.getElementById('pt-grid').classList.remove('filter-active');
    document.querySelectorAll('.legend-item').forEach(i => i.style.opacity = '1');
  } else {
    activeFilter = cat;
    document.getElementById('pt-grid').classList.add('filter-active');
    document.querySelectorAll('.el').forEach(el => {
      el.classList.toggle('cat-match', el.dataset.cat === cat);
    });
    document.querySelectorAll('.legend-item').forEach(i => {
      i.style.opacity = i.dataset.cat === cat ? '1' : '0.4';
    });
  }
}

// Day / Night toggle
function toggleMode() {
  const isDay = document.documentElement.classList.toggle('day');
  document.getElementById('modeIcon').textContent = isDay ? '🌙' : '☀️';
  document.getElementById('modeLabel').textContent = isDay ? 'Night Mode' : 'Day Mode';
}
</script>
